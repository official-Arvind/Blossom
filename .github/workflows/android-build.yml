name: Build and Publish APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Prepare build environment
        run: |
          # Generate keystore if missing
          if [ ! -f "debug.keystore" ]; then
            if [ -f "debug.keystore.base64" ]; then
              base64 -d debug.keystore.base64 > debug.keystore
            else
              keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
            fi
          fi
          
          # Generate mock google-services.json if missing to prevent build crash
          if [ ! -f "app/google-services.json" ]; then
            echo '{"project_info":{"project_number":"123","project_id":"mock-project"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.example"}},"api_key":[{"current_key":"mock-key"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}]}' > app/google-services.json
          fi

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Tag and Changelog
        id: generate_tag
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          # Generate Changelog
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## 🚀 Blossom Release $TAG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Built by Jigar Corporation Pvt Ltd**" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### ⚡ Recent Changes:" >> $GITHUB_OUTPUT
          git log -5 --pretty=format:"- %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk

      - name: Rename APK
        run: mv app-debug.apk Blossom-v1.0.${{ github.run_number }}-Gold.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag }}
          name: Blossom Release ${{ steps.generate_tag.outputs.tag }} Gold
          body: ${{ steps.generate_tag.outputs.changelog }}
          files: Blossom-v1.0.${{ github.run_number }}-Gold.apk
          generate_release_notes: false
          draft: false
          prerelease: false
