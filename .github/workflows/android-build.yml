name: Build and Publish APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # Trigger release on tags like v1.0.0
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        continue-on-error: true

      - name: Build Debug APK
        run: bash ./gradlew assembleDebug --stacktrace
        # Note: If your repository doesn't have the gradlew wrapper committed, 
        # replace the above line with: gradle assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Only run if a tag starting with 'v' is pushed
    permissions:
      contents: write
      
    steps:
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
